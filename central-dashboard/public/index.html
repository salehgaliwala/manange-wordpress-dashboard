<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central WordPress Management System Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for on-the-fly JSX rendering -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Helper to read cookie value
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // Helper to erase cookie
        function eraseCookie(name) {
            document.cookie = name +'=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        }

        function App() {
            // Authentication session states
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            // Password change state variables
            const [isChangingPassword, setIsChangingPassword] = useState(false);
            const [currentPass, setCurrentPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [passError, setPassError] = useState(null);
            const [passSuccess, setPassSuccess] = useState(null);
            const [isSubmittingPass, setIsSubmittingPass] = useState(false);

            // Dashboard and sites state
            const [sites, setSites] = useState([]);

            const [vaultPlugins, setVaultPlugins] = useState([
                { name: 'Sideload Security Suite', slug: 'sideload-security-suite', version: '4.1.2', author: 'WP Vault Devs' },
                { name: 'Custom WooCommerce Optimizer', slug: 'custom-woo-optimizer', version: '1.0.5', author: 'Retail Corp' }
            ]);

            const [selectedSiteIds, setSelectedSiteIds] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [activeJobId, setActiveJobId] = useState(null);
            const [isTriggeringBulk, setIsTriggeringBulk] = useState(false);
            const [bulkActionResult, setBulkActionResult] = useState(null);

            // Site management modal states
            const [isAddingSite, setIsAddingSite] = useState(false);
            const [newSite, setNewSite] = useState({ name: '', url: '', secretKey: '' });

            // Sideload upload simulation state
            const [uploadStatus, setUploadStatus] = useState('idle');
            const [parsedPlugin, setParsedPlugin] = useState(null);

            // Backup destination preference ('s3' or 'local')
            const [backupDest, setBackupDest] = useState('s3');

            // Job queue tracking simulation state
            const [jobProgress, setJobProgress] = useState(0);
            const [jobStep, setJobStep] = useState('Initializing');
            const [finalBackupPath, setFinalBackupPath] = useState('');

            // Fetch sites from CRUD backend API
            const fetchSites = async () => {
                try {
                    const response = await fetch('/api/sites');
                    if (response.ok) {
                        const data = await response.json();
                        setSites(data);
                    }
                } catch (err) {
                    console.error('Failed to fetch sites from backend:', err);
                }
            };

            // Check if user session cookie is already present on initialization
            useEffect(() => {
                fetch('/api/session')
                    .then(res => {
                        if (res.ok) {
                            return res.json();
                        }
                        throw new Error('Not authenticated');
                    })
                    .then(data => {
                        if (data.authenticated) {
                            setIsAuthenticated(true);
                            fetchSites();
                        }
                    })
                    .catch(() => {
                        // fallback to cookie detection
                        const token = getCookie('wp_central_session');
                        if (token) {
                            setIsAuthenticated(true);
                            fetchSites();
                        }
                    });
            }, []);

            // Summary metrics
            const sitesCount = sites.length;
            const updatesNeeded = sites.filter(s => s.pendingUpdates > 0).length;
            const failedBackups = sites.filter(s => s.lastBackupStatus === 'fail').length;

            // Search filtering
            const filteredSites = useMemo(() => {
                return sites.filter(site =>
                    site.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    site.url.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [sites, searchTerm]);

            // Single checkbox toggle
            const handleToggleRow = (id) => {
                const next = new Set(selectedSiteIds);
                if (next.has(id)) {
                    next.delete(id);
                } else {
                    next.add(id);
                }
                setSelectedSiteIds(next);
            };

            // Bulk toggle all rows
            const handleToggleAll = () => {
                if (selectedSiteIds.size === filteredSites.length) {
                    setSelectedSiteIds(new Set());
                } else {
                    setSelectedSiteIds(new Set(filteredSites.map(s => s.id)));
                }
            };

            const isAllSelected = filteredSites.length > 0 && selectedSiteIds.size === filteredSites.length;
            const isSomeSelected = selectedSiteIds.size > 0 && selectedSiteIds.size < filteredSites.length;

            /**
             * Authenticates admin using email and password
             */
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError(null);
                setIsLoggingIn(true);

                // Simple client side email format check
                if (!loginEmail.includes('@') || !loginEmail.includes('.')) {
                    setLoginError('Please enter a valid administrative email address.');
                    setIsLoggingIn(false);
                    return;
                }

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: loginEmail,
                            password: loginPassword
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.token) {
                        // Secure session cookies are set directly by the Express response headers in server.js
                        document.cookie = `wp_central_session=${data.token}; max-age=2592000; path=/; SameSite=Strict`;
                        setIsAuthenticated(true);
                        setTimeout(() => {
                            fetchSites();
                        }, 100);
                    } else {
                        setLoginError(data.error || 'Invalid credentials. Please try again.');
                    }
                } catch (err) {
                    setLoginError('Could not connect to the central dashboard authentication service.');
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = () => {
                eraseCookie('wp_central_session');
                setIsAuthenticated(false);
                setLoginEmail('');
                setLoginPassword('');
                setSites([]);
            };

            const handleBulkAction = (action) => {
                setIsTriggeringBulk(true);
                setBulkActionResult(null);
                setTimeout(() => {
                    setBulkActionResult({
                        success: true,
                        message: `Successfully triggered bulk ${action} concurrently using ${backupDest.toUpperCase()} destination for ${selectedSiteIds.size} site(s)!`
                    });
                    setIsTriggeringBulk(false);
                    setSelectedSiteIds(new Set());
                }, 1500);
            };

            // Dynamic site deletion
            const handleDeleteSite = async (id) => {
                if (!confirm('Are you sure you want to disconnect this WordPress node?')) return;
                try {
                    const response = await fetch(`/api/sites/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        fetchSites();
                    } else {
                        const data = await response.json();
                        alert(data.error || 'Failed to delete site.');
                    }
                } catch (err) {
                    alert('Error deleting site.');
                }
            };

            // Dynamic site sync
            const handleSyncSite = async (id) => {
                try {
                    const response = await fetch(`/api/sites/${id}/sync`, {
                        method: 'POST'
                    });
                    if (response.ok) {
                        fetchSites();
                    } else {
                        const data = await response.json();
                        alert(data.error || 'Failed to synchronize target site status.');
                    }
                } catch (err) {
                    alert('Network error trying to sync site.');
                }
            };

            // Dynamic safe password update execution
            const handleChangePassword = async (e) => {
                e.preventDefault();
                setPassError(null);
                setPassSuccess(null);

                if (newPass !== confirmPass) {
                    setPassError('New passwords do not match.');
                    return;
                }

                if (newPass.length < 6) {
                    setPassError('New password must be at least 6 characters long.');
                    return;
                }

                setIsSubmittingPass(true);
                try {
                    const response = await fetch('/api/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            currentPassword: currentPass,
                            newPassword: newPass
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        setPassSuccess('Password successfully updated!');
                        setCurrentPass('');
                        setNewPass('');
                        setConfirmPass('');
                        setTimeout(() => {
                            setIsChangingPassword(false);
                            setPassSuccess(null);
                        }, 1500);
                    } else {
                        setPassError(data.error || 'Failed to update password.');
                    }
                } catch (err) {
                    setPassError('Network error trying to change password.');
                } finally {
                    setIsSubmittingPass(false);
                }
            };

            // Simulated premium plugin file upload
            const simulateUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploadStatus('uploading');
                setTimeout(() => {
                    const mockMeta = {
                        name: file.name.replace('.zip', '').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '),
                        slug: file.name.replace('.zip', '').toLowerCase(),
                        version: '3.1.0',
                        author: 'Plugin Sideload Corp'
                    };
                    setUploadStatus('success');
                    setParsedPlugin(mockMeta);
                    setVaultPlugins(prev => [mockMeta, ...prev]);
                }, 1800);
            };

            // Automated Direct Update Pipeline (Pre-update backup + direct core/plugin updates)
            const triggerDirectUpdate = async (site) => {
                setActiveJobId('job_' + Date.now());
                setJobProgress(0);
                setJobStep('Initializing Pipeline Connection...');

                const backupPath = backupDest === 's3'
                    ? `S3 Cloud Storage Bucket: ${site.s3Config ? site.s3Config.bucket : 'wp-backups-bucket'}`
                    : `Local Disk Folder: wp-content/uploads/wp-central-backups/backup_${site.id}.zip`;

                setFinalBackupPath(backupPath);

                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    setJobProgress(progress);

                    if (progress < 25) setJobStep(`Triggering target backup execution on target...`);
                    else if (progress < 50) setJobStep(`Exporting databases and archiving entire /wp-content/ directory...`);
                    else if (progress < 75) setJobStep(`Securing archive to final destination: ${backupPath}`);
                    else if (progress < 95) setJobStep(`Dispatching direct Core / Plugin update upgrader routines...`);
                    else setJobStep(`✓ Pipeline complete! Node updated directly and safely.`);

                    if (progress >= 100) {
                        clearInterval(interval);
                        // Refresh status values
                        fetchSites();
                    }
                }, 450);

                try {
                    // Send actual request to trigger S3/local updates
                    await fetch(`/api/sites/${site.id}/safe-update`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: site.pendingUpdates > 0 ? 'plugin' : 'core',
                            plugins: ['akismet/akismet.php'],
                            backup_destination: backupDest
                        })
                    });
                } catch (e) {
                    console.warn('Network connection mocked fallback.');
                }
            };

            // RENDER LOGIN SCREEN GATES IF NOT AUTHENTICATED
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6">
                        <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6">
                            <div className="text-center space-y-2">
                                <div className="w-12 h-12 rounded-2xl bg-violet-600 flex items-center justify-center font-bold text-white shadow-lg shadow-violet-500/20 text-2xl mx-auto">
                                    W
                                </div>
                                <h2 className="text-xl font-black text-white uppercase tracking-tight">WP Central Sign In</h2>
                                <p className="text-xs text-slate-500 font-mono tracking-widest uppercase">Administrative Access Panel</p>
                            </div>

                            {loginError && (
                                <div className="p-4 rounded-xl bg-rose-950/20 border border-rose-900/50 text-rose-300 text-xs font-semibold">
                                    ⚠️ {loginError}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">Email Address</label>
                                    <input
                                        type="email"
                                        required
                                        value={loginEmail}
                                        onChange={(e) => setLoginEmail(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                        placeholder="admin@example.com"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-1">Password</label>
                                    <input
                                        type="password"
                                        required
                                        value={loginPassword}
                                        onChange={(e) => setLoginPassword(e.target.value)}
                                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                        placeholder="••••••••••••"
                                    />
                                </div>

                                <div className="flex items-center justify-between pt-2">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" defaultChecked className="rounded border-slate-800 text-violet-600 bg-slate-950 focus:ring-0 focus:ring-offset-0 cursor-pointer w-4 h-4" />
                                        <span className="text-xs text-slate-400 font-medium">Keep signed in (30 days)</span>
                                    </label>
                                </div>

                                <button
                                    type="submit"
                                    disabled={isLoggingIn}
                                    className="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg text-sm transition shadow-md shadow-violet-500/10 flex items-center justify-center gap-2"
                                >
                                    {isLoggingIn ? (
                                        <>
                                            <span className="w-4 h-4 rounded-full border-2 border-white border-t-transparent animate-spin"></span>
                                            Authenticating Secure Session...
                                        </>
                                    ) : 'Access Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // RENDER INTERACTIVE DASHBOARD SYSTEM
            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation Header */}
                    <header className="bg-slate-900 border-b border-slate-800 py-4 px-8 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-xl bg-violet-600 flex items-center justify-center font-bold text-white shadow-lg shadow-violet-500/20 text-lg">
                                W
                            </div>
                            <div>
                                <h1 className="text-base font-black text-white tracking-tight uppercase">WP Central</h1>
                                <p className="text-[10px] text-slate-500 font-mono tracking-widest font-semibold">MANAGEMENT SYSTEM DASHBOARD</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <button
                                onClick={() => setIsAddingSite(true)}
                                className="bg-violet-600 hover:bg-violet-700 text-white font-bold text-xs px-4 py-2 rounded-lg transition shadow-md shadow-violet-500/10"
                            >
                                + Add New Site
                            </button>
                            <button
                                onClick={() => setIsChangingPassword(true)}
                                className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs px-4 py-2 rounded-lg transition border border-slate-700"
                            >
                                ⚙️ Change Password
                            </button>
                            <span className="text-xs font-mono text-slate-400 bg-slate-950 px-3 py-1.5 rounded-full border border-slate-800">
                                🔑 Admin Mode
                            </span>
                            <button
                                onClick={handleLogout}
                                className="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs px-4 py-2 rounded-lg transition"
                            >
                                Sign Out
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 max-w-7xl mx-auto p-8 w-full space-y-8">

                        {/* Summary Metrics */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl relative overflow-hidden">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider block">Connected Nodes</span>
                                <span className="text-3xl font-black text-white mt-2 block">{sitesCount}</span>
                                <p className="text-xs text-slate-400 mt-2">Target sites active with worker plugins</p>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl relative overflow-hidden">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider block">Sites Needing Updates</span>
                                <span className="text-3xl font-black text-amber-400 mt-2 block">{updatesNeeded}</span>
                                <p className="text-xs text-slate-400 mt-2">Awaiting automated pipeline updates</p>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl relative overflow-hidden">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider block">Failed Backups</span>
                                <span className={`text-3xl font-black mt-2 block ${failedBackups > 0 ? 'text-rose-400' : 'text-emerald-400'}`}>
                                    {failedBackups}
                                </span>
                                <p className="text-xs text-slate-400 mt-2">Backups failing to stream directly to S3</p>
                            </div>
                        </div>

                        {/* Backup Destination preference selector */}
                        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-center justify-between text-sm">
                            <div className="flex items-center gap-2">
                                <span className="text-slate-400 font-semibold">Backup Destination Preference:</span>
                                <span className="text-slate-500">Determine where automated update pipelines save backup archives</span>
                            </div>
                            <div className="flex bg-slate-950 border border-slate-800 rounded-lg p-1">
                                <button
                                    onClick={() => setBackupDest('s3')}
                                    className={`px-3 py-1.5 rounded-md font-bold text-xs transition ${
                                        backupDest === 's3' ? 'bg-violet-600 text-white shadow' : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    S3 Compatible Cloud
                                </button>
                                <button
                                    onClick={() => setBackupDest('local')}
                                    className={`px-3 py-1.5 rounded-md font-bold text-xs transition ${
                                        backupDest === 'local' ? 'bg-violet-600 text-white shadow' : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    Local WP Disk
                                </button>
                            </div>
                        </div>

                        {/* Direct Update Progress bar indicator */}
                        {activeJobId && (
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl space-y-4 animate-fadeIn">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h3 className="text-lg font-bold text-white flex items-center gap-2">
                                            <span className="flex h-2 w-2 relative">
                                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-violet-400 opacity-75"></span>
                                                <span className="relative inline-flex rounded-full h-2 w-2 bg-violet-500"></span>
                                            </span>
                                            Automated Update Pipeline Progress
                                        </h3>
                                        <p className="text-xs text-slate-400 font-mono mt-0.5">Job ID: {activeJobId}</p>
                                    </div>
                                    <button
                                        onClick={() => setActiveJobId(null)}
                                        className="text-xs text-slate-500 hover:text-white bg-slate-950 px-2.5 py-1 border border-slate-800 rounded-md"
                                    >
                                        Dismiss
                                    </button>
                                </div>

                                <div className="space-y-2">
                                    <div className="flex justify-between items-center text-xs font-semibold">
                                        <span className="text-violet-400">{jobStep}</span>
                                        <span className="text-slate-300 font-mono text-sm font-bold">{jobProgress}%</span>
                                    </div>
                                    <div className="w-full bg-slate-950 rounded-full h-3 border border-slate-800 overflow-hidden p-0.5">
                                        <div
                                            className="bg-gradient-to-r from-violet-600 to-indigo-500 h-full rounded-full transition-all duration-500"
                                            style={{ width: `${jobProgress}%` }}
                                        />
                                    </div>
                                </div>

                                {jobProgress >= 100 && (
                                    <div className="pt-4 border-t border-slate-800">
                                        <div className="bg-emerald-950/20 border border-emerald-800/40 p-4 rounded-xl space-y-2">
                                            <span className="text-emerald-400 font-bold block text-sm">✓ Pipeline Execution Successful</span>
                                            <p className="text-xs text-slate-300">
                                                WordPress core and plugin packages have been safely updated directly on the worker. The previous system files and database were archived and secure.
                                            </p>
                                            <div className="text-[11px] font-mono text-slate-400 bg-slate-950 p-2 rounded border border-slate-850">
                                                <span className="text-slate-500">Backup Scope:</span> /wp-content/ directory & MySQL Database Dump<br/>
                                                <span className="text-slate-500">Backup Storage Path:</span> {finalBackupPath}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Sites Data Table */}
                        <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl p-6">
                            <div className="flex flex-col md:flex-row md:items-center justify-between pb-6 border-b border-slate-800 gap-4">
                                <div>
                                    <h2 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                        <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                        Connected WordPress Sites ({sites.length})
                                    </h2>
                                    <p className="text-sm text-slate-400 mt-1">Manage core/plugin updates and secure backup nodes concurrently.</p>
                                </div>

                                <div className="flex flex-wrap items-center gap-3">
                                    <input
                                        type="text"
                                        placeholder="Search sites..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="bg-slate-950 border border-slate-800 text-sm rounded-lg px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-violet-500 text-slate-200"
                                    />

                                    {selectedSiteIds.size > 0 && (
                                        <div className="flex items-center gap-2 bg-slate-950 border border-slate-800 rounded-lg p-1.5 animate-fadeIn">
                                            <span className="text-xs text-violet-400 font-semibold px-2">
                                                {selectedSiteIds.size} Selected
                                            </span>
                                            <button
                                                onClick={() => handleBulkAction('update')}
                                                disabled={isTriggeringBulk}
                                                className="bg-violet-600 hover:bg-violet-700 text-white font-medium text-xs rounded px-3 py-1.5 transition disabled:opacity-50"
                                            >
                                                Bulk Update
                                            </button>
                                            <button
                                                onClick={() => handleBulkAction('backup')}
                                                disabled={isTriggeringBulk}
                                                className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-medium text-xs rounded px-3 py-1.5 transition disabled:opacity-50"
                                            >
                                                Bulk S3 Backup
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {bulkActionResult && (
                                <div className="mt-4 p-4 rounded-lg bg-emerald-950/30 border border-emerald-800 text-emerald-300 text-sm flex items-center justify-between">
                                    <span>{bulkActionResult.message}</span>
                                    <button onClick={() => setBulkActionResult(null)} className="underline font-semibold ml-2">Dismiss</button>
                                </div>
                            )}

                            <div className="overflow-x-auto mt-6">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="border-b border-slate-800 text-xs font-semibold text-slate-400 tracking-wider">
                                            <th className="py-4 px-4 w-12 text-center">
                                                <input
                                                    type="checkbox"
                                                    checked={isAllSelected}
                                                    onChange={handleToggleAll}
                                                    className="rounded border-slate-800 text-violet-600 bg-slate-950 focus:ring-0 focus:ring-offset-0 cursor-pointer w-4 h-4"
                                                />
                                            </th>
                                            <th className="py-4 px-4">Site Name</th>
                                            <th className="py-4 px-4">Site URL</th>
                                            <th className="py-4 px-4">WP Version</th>
                                            <th className="py-4 px-4">Pending Updates</th>
                                            <th className="py-4 px-4">Last S3 Backup Status</th>
                                            <th className="py-4 px-4 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800 text-sm">
                                        {filteredSites.map((site) => {
                                            const isSelected = selectedSiteIds.has(site.id);
                                            return (
                                                <tr key={site.id} className={`transition hover:bg-slate-800/40 ${isSelected ? 'bg-violet-950/10' : ''}`}>
                                                    <td className="py-4 px-4 text-center">
                                                        <input
                                                            type="checkbox"
                                                            checked={isSelected}
                                                            onChange={() => handleToggleRow(site.id)}
                                                            className="rounded border-slate-800 text-violet-600 bg-slate-950 focus:ring-0 focus:ring-offset-0 cursor-pointer w-4 h-4"
                                                        />
                                                    </td>
                                                    <td className="py-4 px-4 font-bold text-white">{site.name}</td>
                                                    <td className="py-4 px-4 text-slate-400 font-mono text-xs">{site.url}</td>
                                                    <td className="py-4 px-4 font-semibold text-slate-300">
                                                        <span className="bg-slate-950 px-2.5 py-1.5 rounded-md border border-slate-850">
                                                            v{site.wpVersion || '6.4.2'}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-4">
                                                        {site.pendingUpdates > 0 ? (
                                                            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20">
                                                                <span className="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                                                                {site.pendingUpdates} available
                                                            </span>
                                                        ) : (
                                                            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                                                                ✓ Up to date
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td className="py-4 px-4 text-xs">
                                                        {site.lastBackupStatus === 'success' ? (
                                                            <div className="flex flex-col gap-0.5">
                                                                <span className="text-slate-400 font-medium">{site.lastBackupTime.includes('Just') ? 'Local Disk Secured' : 'S3 Secured'}</span>
                                                                <span className="text-[10px] text-slate-500 font-mono">{site.lastBackupTime}</span>
                                                            </div>
                                                        ) : (
                                                            <span className="font-bold text-rose-400">⚠️ Failed ({site.lastBackupTime})</span>
                                                        )}
                                                    </td>
                                                    <td className="py-4 px-4 text-right">
                                                        <div className="flex items-center justify-end gap-2">
                                                            <button
                                                                onClick={() => triggerDirectUpdate(site)}
                                                                className="bg-violet-600/10 hover:bg-violet-600 border border-violet-500/20 text-violet-300 hover:text-white font-semibold text-xs px-2.5 py-1.5 rounded transition"
                                                            >
                                                                Update
                                                            </button>
                                                            <button
                                                                onClick={() => handleSyncSite(site.id)}
                                                                className="bg-sky-600/10 hover:bg-sky-600 border border-sky-500/20 text-sky-300 hover:text-white font-semibold text-xs px-2.5 py-1.5 rounded transition"
                                                            >
                                                                🔄 Sync
                                                            </button>
                                                            <button
                                                                onClick={() => {
                                                                    alert(`Backup triggered to ${backupDest.toUpperCase()} for: ${site.name}`);
                                                                    setSites(sites.map(s => s.id === site.id ? { ...s, lastBackupStatus: 'success', lastBackupTime: 'Just now' } : s));
                                                                }}
                                                                className="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-semibold text-xs px-2.5 py-1.5 rounded transition"
                                                            >
                                                                Backup ({backupDest === 's3' ? 'S3' : 'Local'})
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteSite(site.id)}
                                                                className="bg-rose-950/20 hover:bg-rose-900 border border-rose-850/20 text-rose-300 hover:text-white font-semibold text-xs px-2.5 py-1.5 rounded transition"
                                                            >
                                                                Delete
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Bottom Grid (Vault Upload & Inventory) */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">

                            {/* Premium Plugin Vault Drag-and-Drop */}
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl">
                                <div className="mb-4">
                                    <h3 className="text-lg font-bold text-white">Premium Plugin Sideload Vault</h3>
                                    <p className="text-xs text-slate-400">Upload private `.zip` files. We parse the PHP headers dynamically for pre-signed sideload tokens.</p>
                                </div>

                                <div
                                    onClick={() => document.getElementById('vault-file-picker').click()}
                                    className="border-2 border-dashed border-slate-800 hover:border-slate-700 bg-slate-950/40 hover:bg-slate-950/70 rounded-xl p-8 text-center flex flex-col items-center justify-center cursor-pointer transition"
                                >
                                    <input
                                        type="file"
                                        id="vault-file-picker"
                                        onChange={simulateUpload}
                                        accept=".zip"
                                        className="hidden"
                                    />
                                    <p className="text-sm font-semibold text-white">Drag & Drop plugin `.zip` here</p>
                                    <p className="text-xs text-slate-500 mt-1">or click to browse local folders</p>
                                </div>

                                {uploadStatus === 'uploading' && (
                                    <div className="mt-4 p-4 rounded-xl bg-slate-950 border border-slate-800 flex items-center gap-3">
                                        <span className="w-4 h-4 rounded-full border-2 border-violet-500 border-t-transparent animate-spin"></span>
                                        <span className="text-xs text-slate-400 font-medium">Unpacking zip package and registering slugs...</span>
                                    </div>
                                )}

                                {uploadStatus === 'success' && parsedPlugin && (
                                    <div className="mt-4 p-4 rounded-xl bg-emerald-950/20 border border-emerald-900/40 text-xs space-y-2">
                                        <span className="text-emerald-400 font-bold block">✓ Vault Registration Successful</span>
                                        <div className="grid grid-cols-2 gap-2 text-slate-300">
                                            <div><span className="text-slate-500">Name:</span> {parsedPlugin.name}</div>
                                            <div><span className="text-slate-500">Slug:</span> {parsedPlugin.slug}</div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Vault Inventory List */}
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl flex flex-col justify-between">
                                <div>
                                    <h3 className="text-lg font-bold text-white mb-4">Sideload Vault Inventory ({vaultPlugins.length})</h3>
                                    <div className="overflow-y-auto max-h-52">
                                        <table className="w-full text-left text-xs divide-y divide-slate-800">
                                            <thead>
                                                <tr className="text-slate-500 uppercase font-bold py-2">
                                                    <th className="pb-2">Plugin Name</th>
                                                    <th className="pb-2">Slug</th>
                                                    <th className="pb-2">Version</th>
                                                    <th className="pb-2 text-right">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800 text-slate-300">
                                                {vaultPlugins.map((plugin, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-800/10">
                                                        <td className="py-2.5 font-semibold text-white">{plugin.name}</td>
                                                        <td className="py-2.5 font-mono text-violet-400">{plugin.slug}</td>
                                                        <td className="py-2.5 font-bold">v{plugin.version}</td>
                                                        <td className="py-2.5 text-right">
                                                            <button
                                                                onClick={() => {
                                                                    setVaultPlugins(prev => prev.filter((_, i) => i !== idx));
                                                                }}
                                                                className="text-rose-400 hover:text-rose-300 font-bold"
                                                            >
                                                                Delete
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="text-[10px] text-slate-500 font-mono mt-4 pt-4 border-t border-slate-800">
                                    * Short-lived pre-signed download tokens expire automatically
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* Change Password Modal */}
                    {isChangingPassword && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-md space-y-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-white flex items-center gap-2">
                                        <span>⚙️ Change Admin Password</span>
                                    </h3>
                                    <button
                                        onClick={() => {
                                            setIsChangingPassword(false);
                                            setPassError(null);
                                            setPassSuccess(null);
                                        }}
                                        className="text-slate-400 hover:text-white font-bold text-lg"
                                    >
                                        ✕
                                    </button>
                                </div>

                                {passError && (
                                    <div className="p-3 rounded-lg bg-rose-950/20 border border-rose-900/50 text-rose-300 text-xs font-semibold">
                                        ⚠️ {passError}
                                    </div>
                                )}

                                {passSuccess && (
                                    <div className="p-3 rounded-lg bg-emerald-950/20 border border-emerald-900/50 text-emerald-300 text-xs font-semibold">
                                        ✓ {passSuccess}
                                    </div>
                                )}

                                <form onSubmit={handleChangePassword} className="space-y-3">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">Current Password</label>
                                        <input
                                            type="password"
                                            required
                                            value={currentPass}
                                            onChange={(e) => setCurrentPass(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="Current Password"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">New Password</label>
                                        <input
                                            type="password"
                                            required
                                            value={newPass}
                                            onChange={(e) => setNewPass(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="At least 6 characters"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">Confirm New Password</label>
                                        <input
                                            type="password"
                                            required
                                            value={confirmPass}
                                            onChange={(e) => setConfirmPass(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="Verify new password"
                                        />
                                    </div>

                                    <div className="flex gap-2 justify-end pt-4">
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setIsChangingPassword(false);
                                                setPassError(null);
                                                setPassSuccess(null);
                                            }}
                                            className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2 rounded-lg font-bold"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            type="submit"
                                            disabled={isSubmittingPass}
                                            className="bg-violet-600 hover:bg-violet-700 text-white text-xs px-4 py-2 rounded-lg font-bold transition disabled:opacity-50"
                                        >
                                            {isSubmittingPass ? 'Updating...' : 'Save Password'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Site Modal Form */}
                    {isAddingSite && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-md space-y-4">
                                <h3 className="text-lg font-bold text-white">Add Connected WordPress Node</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">Site Name</label>
                                        <input
                                            type="text"
                                            value={newSite.name}
                                            onChange={(e) => setNewSite({...newSite, name: e.target.value})}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="e.g. My Agency Client"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">WordPress URL</label>
                                        <input
                                            type="text"
                                            value={newSite.url}
                                            onChange={(e) => setNewSite({...newSite, url: e.target.value})}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="https://example.com"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-400 block mb-1">Shared HMAC Secret Key</label>
                                        <input
                                            type="password"
                                            value={newSite.secretKey}
                                            onChange={(e) => setNewSite({...newSite, secretKey: e.target.value})}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-violet-500"
                                            placeholder="••••••••••••••••"
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-2 justify-end pt-4">
                                    <button
                                        onClick={() => setIsAddingSite(false)}
                                        className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2 rounded-lg font-bold"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={async () => {
                                            if (newSite.name && newSite.url) {
                                                try {
                                                    const res = await fetch('/api/sites', {
                                                        method: 'POST',
                                                        headers: { 'Content-Type': 'application/json' },
                                                        body: JSON.stringify(newSite)
                                                    });
                                                    if (res.ok) {
                                                        fetchSites();
                                                        setNewSite({ name: '', url: '', secretKey: '' });
                                                        setIsAddingSite(false);
                                                    } else {
                                                        const data = await res.json();
                                                        alert(data.error || 'Failed to add site.');
                                                    }
                                                } catch (err) {
                                                    alert('Error adding site.');
                                                }
                                            }
                                        }}
                                        className="bg-violet-600 hover:bg-violet-700 text-white text-xs px-4 py-2 rounded-lg font-bold"
                                    >
                                        Connect Node
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Mount the React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
